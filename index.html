<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do List 🌸</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">
    <div class="reminder" id="reminder">
  ⚠️ You have incomplete tasks from yesterday!
  <button class="close-reminder" onclick="closeReminder()">✕</button>
</div>
    <h1>✨ My To-Do List</h1>

    <div class="counter" id="counter">0 tasks done 🎯</div>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Add something fun... 🌟" />
      <button onclick="addTask()">Add 🚀</button>
    </div>

    <div class="filters">
      <button class="filter-btn" onclick="filterTasks('all')">All</button>
      <button class="filter-btn active" onclick="filterTasks('active')">Active</button>
      <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
    </div>

    <ul id="taskList"></ul>
    <div class="celebration" id="celebration">
  <img src="https://media.giphy.com/media/artj92V8o75VPL7AeQ/giphy.gif" alt="celebrate" />
  <p>You crushed it today! 🎉</p>
</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
